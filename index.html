<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的英语单词本</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary-color); }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        button#add-btn {
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button#add-btn:hover { background-color: #357abd; }

        .vocab-list {
            list-style: none;
            padding: 0;
        }

        .vocab-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }

        .vocab-item:hover { background-color: #f0f7ff; }

        .vocab-content {
            display: flex;
            flex: 1;
        }

        .cn { width: 40%; color: #666; font-size: 0.9em; }
        .en { width: 50%; font-weight: bold; font-size: 1.1em; }
        
        .count-badge {
            background: #e1f5fe;
            color: #01579b;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .tip {
            font-size: 0.8em;
            color: #999;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📓 单词记忆本</h2>
    
    <div class="input-group">
        <input type="text" id="cn-input" placeholder="中文翻译">
        <input type="text" id="en-input" placeholder="English Word">
        <button id="add-btn">添加</button>
    </div>

    <ul class="vocab-list" id="vocab-list">
        </ul>

    <p class="tip">点击单词行，学习次数 +1，并自动按熟练度排序</p>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('myVocab')) || [];

    const cnInput = document.getElementById('cn-input');
    const enInput = document.getElementById('en-input');
    const addBtn = document.getElementById('add-btn');
    const vocabList = document.getElementById('vocab-list');

    // 初始化渲染
    renderList();

    // 添加单词逻辑
    addBtn.addEventListener('click', () => {
        const cn = cnInput.value.trim();
        const en = enInput.value.trim();

        if (cn && en) {
            words.push({ cn, en, count: 0, time: Date.now() });
            saveAndRender();
            cnInput.value = '';
            enInput.value = '';
            enInput.focus();
        }
    });

    // 增加计数并排序
    function incrementCount(index) {
        words[index].count += 1;
        saveAndRender();
    }

    function saveAndRender() {
        // 核心排序逻辑：按点击次数（学习频率）从高到低排序
        words.sort((a, b) => b.count - a.count);
        
        localStorage.setItem('myVocab', JSON.stringify(words));
        renderList();
    }

    function renderList() {
        vocabList.innerHTML = '';
        words.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = 'vocab-item';
            li.onclick = () => incrementCount(index);

            li.innerHTML = `
                <div class="vocab-content">
                    <span class="cn">${item.cn}</span>
                    <span class="en">${item.en}</span>
                </div>
                <span class="count-badge">已学 ${item.count} 次</span>
            `;
            vocabList.appendChild(li);
        });
    }

    // 回车添加功能
    enInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addBtn.click();
    });
</script>

</body>
</html>
