<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人单词本(全手动稳健版)</title>
    <style>
        :root { --main-blue: #4a90e2; --bg: #f5f7fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--main-blue); margin-bottom: 20px; }
        
        /* 输入区样式 */
        .input-box { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 10px; outline: none; box-sizing: border-box; font-size: 16px; transition: 0.2s; }
        input:focus { border-color: var(--main-blue); background: #fff; }
        
        /* 按钮样式 */
        #add-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--main-blue); color: white; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; box-shadow: 0 4px 6px rgba(74,144,226,0.2); }
        #add-btn:active { transform: scale(0.98); }

        /* 搜索和工具 */
        .search-input { margin-top: 25px; background: #fff; border: 1px solid #ddd; border-radius: 25px; padding-left: 15px; }
        .tool-bar { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .export-btn { font-size: 12px; color: #4caf50; cursor: pointer; border: 1px solid #4caf50; padding: 4px 10px; border-radius: 5px; background: none; }

        /* 列表样式 */
        .vocab-list { list-style: none; padding: 0; margin-top: 10px; }
        .vocab-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .vocab-item:hover { background: #f8faff; }
        .word-info { flex: 1; }
        .en { font-weight: bold; font-size: 1.1em; color: #2c3e50; }
        .cn { color: #7f8c8d; font-size: 0.95em; margin-top: 3px; }
        .badge { background: #e1f5fe; color: #01579b; padding: 3px 10px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
        .del { color: #e74c3c; margin-left: 15px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📓 My Vocab Box</h2>
    
    <div class="input-box">
        <label>English Word (英文)</label>
        <input type="text" id="en-in" placeholder="输入单词，如 contract" autocomplete="off">
    </div>

    <div class="input-box">
        <label>Translation (中文翻译)</label>
        <input type="text" id="cn-in" placeholder="手动输入你的解释..." autocomplete="off">
    </div>

    <button id="add-btn">确认添加单词</button>

    <input type="text" id="q-in" class="search-input" style="width:100%; padding:10px 15px; box-sizing:border-box;" placeholder="🔍 在已存单词中搜索...">

    <div class="tool-bar">
        <span style="font-size: 12px; color: #999;">点击单词可发音并增加计数</span>
        <button class="export-btn" onclick="toWord()">📝 导出 Word</button>
    </div>

    <ul class="vocab-list" id="list"></ul>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('myVocab')) || [];

    // 渲染列表
    function render(filter = "") {
        const list = document.getElementById('list');
        list.innerHTML = '';
        
        const filtered = words.filter(w => 
            w.en.toLowerCase().includes(filter.toLowerCase()) || 
            w.cn.includes(filter)
        );

        // 按点击次数排序
        filtered.sort((a, b) => b.count - a.count);

        filtered.forEach(item => {
            const idx = words.indexOf(item);
            const li = document.createElement('li');
            li.className = 'vocab-item';
            li.innerHTML = `
                <div class="word-info" onclick="play('${item.en}', ${idx})">
                    <div class="en">${item.en} 🔊</div>
                    <div class="cn">${item.cn}</div>
                </div>
                <div style="display:flex; align-items:center;">
                    <span class="badge">${item.count}次</span>
                    <span class="del" onclick="remove(event, ${idx})">×</span>
                </div>
            `;
            list.appendChild(li);
        });
        localStorage.setItem('myVocab', JSON.stringify(words));
    }

    // 发音并计数
    function play(txt, i) {
        const s = new SpeechSynthesisUtterance(txt);
        s.lang = 'en-US';
        window.speechSynthesis.speak(s);
        words[i].count++;
        render(document.getElementById('q-in').value);
    }

    // 删除
    function remove(e, i) {
        e.stopPropagation();
        if(confirm('确定删除这个词吗？')) {
            words.splice(i, 1);
            render(document.getElementById('q-in').value);
        }
    }

    // 添加单词
    document.getElementById('add-btn').onclick = () => {
        const en = document.getElementById('en-in').value.trim();
        const cn = document.getElementById('cn-in').value.trim();
        if (en && cn) {
            words.push({ en, cn, count: 0 });
            render();
            document.getElementById('en-in').value = '';
            document.getElementById('cn-in').value = '';
            document.getElementById('en-in').focus();
        } else {
            alert('请完整填写单词和翻译！');
        }
    };

    // 搜索
    document.getElementById('q-in').oninput = (e) => render(e.target.value);

    // 导出 Word
    function toWord() {
        if(words.length === 0) return alert('还没单词可导出哦');
        let t = `<table border="1" style="border-collapse:collapse;width:100%"><tr><th>英文</th><th>中文</th><th>已学次数</th></tr>`;
        words.forEach(w => t += `<tr><td>${w.en}</td><td>${w.cn}</td><td align="center">${w.count}</td></tr>`);
        const b = new Blob(['<html><meta charset="utf-8"><body>'+t+'</table></body></html>'], {type:'application/msword'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='我的单词本.doc'; a.click();
    }

    render();
</script>
</body>
</html>
